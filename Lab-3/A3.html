 <!-- WAP in JavaScript to ƒnd the factorial of given number. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let n = parseInt(prompt("Enter n :"));
        let fac=1;
        for(let i=1;i<=n;i++){
            fac *=i;
        }
        alert(fac);
    </script>
</head>

</body>
</html>
