<!-- WAP in JavaScript to print the Fibonacci series of a number.  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let n = parseInt(prompt("Enter n :"));
        let first=0,sec = 1,temp=0;
        for(let i=1;i<=n;i++){
            document.write(temp + ",");
            first=sec;
            sec=temp;
            temp=first+sec;
        }
    </script>
</head>
<body>
    
</body>
</html>
