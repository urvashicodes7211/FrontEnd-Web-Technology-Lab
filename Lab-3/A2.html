<!-- WAP in JavaScript to check whether the given no. is prime or not.  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    let n = parseInt(prompt("Enter n :"));
    let c=0;
    for(let i=1;i<=n;i++){
        if(n%i == 0){
            c+=1;
        }
    }
    if(c == 2){
        alert("prime");
    }else{
        alert("Not prime");
    }
</script>

</body>
</html>
