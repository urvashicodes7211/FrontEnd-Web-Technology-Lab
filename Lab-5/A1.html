<!-- Demonstrate the use of array to ƒind maximum number. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter n : "));
        let a = [];
        for(let i=0;i<n;i++){
            a[i] = parseInt(prompt("Enter number : "));
        }
        let max = a[0];
        for(i=0;i<n;i++){
            if(a[i]>max){
                max = a[i];
            }
        }
        document.write("maximum number : "+max);
    </script>
</body>
</html>
