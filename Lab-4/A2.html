<!-- WAP in JavaScript to prime number between the given range of number.  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = parseInt(prompt("Enter a : "));
        let b = parseInt(prompt("Enter b : "));

        for(let i = a ; i <= b ; i++){
            let c=0;
            for(let j = 1; j <= i;j++){
                if(i % j == 0){
                    c++;
                }
            }
            if(c == 2){
                document.write(i+"<br/>");
            }
        }

    </script>
</body>
</html>
